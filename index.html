<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TikTok Review Reports SPA</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #0f172a;
      --border: #22304d;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #38bdf8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      background: rgba(15, 23, 42, 0.92);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .title {
      font-size: 14px;
      color: var(--muted);
      letter-spacing: 0.02em;
      white-space: nowrap;
    }
    .tabs {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .tab {
      border: 1px solid rgba(56, 189, 248, 0.28);
      background: rgba(2, 132, 199, 0.08);
      color: var(--text);
      border-radius: 12px;
      padding: 8px 10px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: all .2s ease;
      text-decoration: none;
    }
    .tab img {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      display: block;
    }
    .tab.active {
      border-color: rgba(56, 189, 248, 0.75);
      box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.2) inset;
      background: rgba(56, 189, 248, 0.16);
    }
    .tab span {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    .viewport {
      flex: 1;
      min-height: 0;
    }
    iframe {
      width: 100%;
      height: calc(100vh - 58px);
      border: 0;
      background: #0b1220;
    }
  </style>
</head>

  <div class="viewport">
    <iframe id="reportFrame" name="reportFrame" src="review_vsc.html" title="TikTok report content"></iframe>
  </div>

  <script>
    const frame = document.getElementById("reportFrame");
    const tabs = Array.from(document.querySelectorAll(".tab"));

    function activate(target) {
      const isVsc = target === "vsc";
      frame.src = isVsc ? "review_vsc.html" : "review_cursor.html";
      tabs.forEach((tab) => tab.classList.toggle("active", tab.dataset.target === target));
      const url = new URL(window.location.href);
      url.hash = isVsc ? "#vsc" : "#cursor";
      history.replaceState(null, "", url.toString());
    }

    tabs.forEach((tab) =>
      tab.addEventListener("click", () => {
        activate(tab.dataset.target);
      })
    );

    const initial = window.location.hash.replace("#", "");
    activate(initial === "cursor" ? "cursor" : "vsc");
  </script>
